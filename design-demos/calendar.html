<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lael — Calendar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="shared.js"></script>
<style id="global-styles"></style>
<style>
  html, body { height: 100%; overflow: hidden; }
  .cal-cell {
    background: #FFFEFA;
    border: 1px solid #E2DAD0;
    transition: all 0.18s ease;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .cal-cell:hover {
    background: #F5F0E8;
    border-color: #BBF7D0;
    z-index: 2;
  }
  .cal-cell.outside {
    background: #F5F0E8;
    color: #A8A29E;
  }
  .cal-cell.outside:hover {
    background: #EDE6DC;
  }
  .cal-cell.today {
    background: #F0FDF4;
    border-color: #166534;
    box-shadow: inset 0 0 0 1px #166534;
  }
  .cal-cell.today:hover {
    background: #DCFCE7;
  }
  .cal-cell.selected {
    background: #FFFEFA;
    border-color: #166534;
    box-shadow: inset 0 0 0 2px #166534;
    z-index: 3;
  }
  .cal-cell.has-overdue {
    border-left: 3px solid #B91C1C;
  }
</style>
</head>
<body>
<div id="root"></div>
<script>
  document.getElementById('global-styles').textContent = window.Lael.GLOBAL_STYLES;
</script>
<script type="text/babel">
const {
  PALETTE, TYPOGRAPHY, ASSESSMENTS, TYPE_LABELS, TYPE_COLORS,
  PRIORITY_CONFIG, Navbar, PageHeader, Modal, AddAssessmentForm
} = window.Lael;

const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS_FULL = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

function Calendar() {
  const [currentMonth, setCurrentMonth] = React.useState(5);
  const [currentYear, setCurrentYear] = React.useState(2026);
  const [selectedDay, setSelectedDay] = React.useState(14);
  const [addOpen, setAddOpen] = React.useState(false);

  // Build the calendar grid
  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const daysInPrevMonth = new Date(currentYear, currentMonth, 0).getDate();

  // Group assessments by day for this month
  const assessmentsByDay = {};
  ASSESSMENTS.forEach(item => {
    const d = new Date(item.dueDate);
    if (d.getMonth() === currentMonth && d.getFullYear() === currentYear) {
      const day = d.getDate();
      if (!assessmentsByDay[day]) assessmentsByDay[day] = [];
      assessmentsByDay[day].push(item);
    }
  });

  // Build 6 rows of 7 days
  const rows = [];
  let dayCounter = 1;
  let nextMonthCounter = 1;

  for (let week = 0; week < 6; week++) {
    const weekRow = [];
    for (let dow = 0; dow < 7; dow++) {
      const cellIndex = week * 7 + dow;
      if (cellIndex < firstDay) {
        const padDay = daysInPrevMonth - (firstDay - 1 - cellIndex);
        weekRow.push({ day: padDay, isCurrent: false, items: [] });
      } else if (dayCounter <= daysInMonth) {
        const items = assessmentsByDay[dayCounter] || [];
        weekRow.push({ day: dayCounter, isCurrent: true, items });
        dayCounter++;
      } else {
        weekRow.push({ day: nextMonthCounter, isCurrent: false, items: [] });
        nextMonthCounter++;
      }
    }
    rows.push(weekRow);
  }

  const today = 14;

  return (
    <div style={{ height: '100vh', display: 'flex', flexDirection: 'column' }}>
      <Navbar activePage="calendar" onAddClick={() => setAddOpen(true)} />

      <div style={{
        flex: 1, display: 'flex', flexDirection: 'column',
        maxWidth: 1500, width: '100%', margin: '0 auto',
        padding: '14px 32px 24px', boxSizing: 'border-box',
        minHeight: 0,
      }}>

        {/* Trimmed header — month/year is the focus */}
        <PageHeader
          title={`${MONTHS[currentMonth]} ${currentYear}`}
          subtitle={
            <span style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <span style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
                <span style={{ width: 6, height: 6, borderRadius: '50%', background: PALETTE.accent }} />
                <span><strong style={{ color: PALETTE.textPrimary, fontWeight: 500 }}>{Object.values(assessmentsByDay).flat().filter(i => i.status !== 'completed').length}</strong> pending</span>
              </span>
              <span style={{ color: PALETTE.border }}>·</span>
              <span style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
                <span style={{ width: 6, height: 6, borderRadius: '50%', background: PALETTE.success }} />
                <span><strong style={{ color: PALETTE.textPrimary, fontWeight: 500 }}>{Object.values(assessmentsByDay).flat().filter(i => i.status === 'completed').length}</strong> completed</span>
              </span>
            </span>
          }
          actions={[
            <button key="today" onClick={() => { setCurrentMonth(5); setCurrentYear(2026); setSelectedDay(14); }}
              style={{
                fontSize: 11, color: PALETTE.accent, background: 'none', border: `1px solid ${PALETTE.border}`,
                cursor: 'pointer', fontWeight: 500, padding: '6px 12px', borderRadius: 6,
                textTransform: 'uppercase', letterSpacing: '0.08em', transition: 'all 0.15s ease',
              }}
              onMouseEnter={(e) => { e.currentTarget.style.background = PALETTE.accentLight; e.currentTarget.style.borderColor = PALETTE.accentBorder; }}
              onMouseLeave={(e) => { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.borderColor = PALETTE.border; }}
            >Today</button>,
            <div key="nav" style={{
              display: 'flex', alignItems: 'center', gap: 2,
              padding: 2, borderRadius: 8, background: PALETTE.surface, border: `1px solid ${PALETTE.border}`,
            }}>
              <button onClick={() => {
                  if (currentMonth === 0) { setCurrentMonth(11); setCurrentYear(y => y - 1); }
                  else setCurrentMonth(m => m - 1);
                }}
                style={{ width: 30, height: 30, borderRadius: 6, border: 'none', background: 'transparent', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', transition: 'background 0.15s ease' }}
                onMouseEnter={(e) => e.currentTarget.style.background = PALETTE.bgWarm}
                onMouseLeave={(e) => e.currentTarget.style.background = 'transparent'}
              >
                <svg width="12" height="12" viewBox="0 0 14 14" fill="none">
                  <path d="M9 2L4 7l5 5" stroke={PALETTE.textSecondary} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
              </button>
              <button onClick={() => {
                  if (currentMonth === 11) { setCurrentMonth(0); setCurrentYear(y => y + 1); }
                  else setCurrentMonth(m => m + 1);
                }}
                style={{ width: 30, height: 30, borderRadius: 6, border: 'none', background: 'transparent', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', transition: 'background 0.15s ease' }}
                onMouseEnter={(e) => e.currentTarget.style.background = PALETTE.bgWarm}
                onMouseLeave={(e) => e.currentTarget.style.background = 'transparent'}
              >
                <svg width="12" height="12" viewBox="0 0 14 14" fill="none">
                  <path d="M5 2l5 5-5 5" stroke={PALETTE.textSecondary} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
              </button>
            </div>,
          ]}
        />

        {/* Calendar grid — full width, fills remaining space */}
        <div style={{
          flex: 1, display: 'flex', flexDirection: 'column',
          background: PALETTE.surface,
          border: `1px solid ${PALETTE.border}`,
          borderRadius: 16,
          boxShadow: PALETTE.shadow,
          overflow: 'hidden',
          minHeight: 0,
        }}>

          {/* Day-of-week headers */}
          <div style={{
            display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)',
            background: PALETTE.bgWarm,
            borderBottom: `1px solid ${PALETTE.border}`,
            flexShrink: 0,
          }}>
            {DAYS_FULL.map((d, i) => (
              <div key={d} style={{
                textAlign: 'center', padding: '12px 0',
                fontSize: 10.5, fontWeight: 600, color: i === 0 || i === 6 ? PALETTE.textTertiary : PALETTE.textSecondary,
                textTransform: 'uppercase', letterSpacing: '0.12em',
                borderRight: i < 6 ? `1px solid ${PALETTE.borderLight}` : 'none',
              }}>
                {d}
              </div>
            ))}
          </div>

          {/* 6-week grid — fills remaining height */}
          <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minHeight: 0 }}>
            {rows.map((week, weekIdx) => (
              <div key={weekIdx} style={{
                display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)',
                flex: 1, minHeight: 0,
                borderBottom: weekIdx < 5 ? `1px solid ${PALETTE.borderLight}` : 'none',
              }}>
                {week.map((cell, dowIdx) => {
                  const isToday = cell.isCurrent && cell.day === today;
                  const isSelected = cell.isCurrent && cell.day === selectedDay;
                  const hasItems = cell.items.length > 0;
                  const hasOverdue = cell.items.some(i => i.status !== 'completed' && new Date(i.dueDate) < new Date(2026, 5, 14));

                  let cellClasses = 'cal-cell';
                  if (!cell.isCurrent) cellClasses += ' outside';
                  if (isToday) cellClasses += ' today';
                  if (isSelected) cellClasses += ' selected';
                  if (hasOverdue) cellClasses += ' has-overdue';

                  return (
                    <div
                      key={dowIdx}
                      onClick={() => cell.isCurrent && setSelectedDay(cell.day)}
                      className={cellClasses}
                      style={{
                        borderRight: dowIdx < 6 ? `1px solid ${PALETTE.borderLight}` : 'none',
                        padding: '10px 12px 12px',
                      }}
                    >
                      {/* Day number header */}
                      <div style={{
                        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                        marginBottom: 8,
                      }}>
                        <span style={{
                          fontFamily: TYPOGRAPHY.display,
                          fontSize: 19, fontWeight: isToday ? 600 : 400,
                          color: cell.isCurrent
                            ? (isToday ? PALETTE.accent : PALETTE.textPrimary)
                            : PALETTE.textTertiary,
                          lineHeight: 1,
                        }}>
                          {cell.day}
                        </span>
                        {isToday && (
                          <span style={{
                            fontSize: 8, fontWeight: 700, color: PALETTE.accent,
                            background: '#BBF7D0', padding: '2px 6px', borderRadius: 10,
                            letterSpacing: '0.08em',
                          }}>
                            TODAY
                          </span>
                        )}
                        {!isToday && hasItems && cell.isCurrent && (
                          <span style={{
                            fontSize: 9, fontWeight: 500, color: PALETTE.textTertiary,
                          }}>
                            {cell.items.length} {cell.items.length === 1 ? 'item' : 'items'}
                          </span>
                        )}
                      </div>

                      {/* Assessment pills — show more since cells are bigger */}
                      {hasItems && cell.isCurrent && (
                        <div style={{ display: 'flex', flexDirection: 'column', gap: 4, overflow: 'hidden' }}>
                          {cell.items.slice(0, 3).map(item => {
                            const typeStyle = TYPE_COLORS[item.type];
                            const isCompleted = item.status === 'completed';
                            return (
                              <div key={item.id} style={{
                                background: typeStyle.bg,
                                color: typeStyle.color,
                                fontSize: 11, fontWeight: 500,
                                padding: '4px 8px', borderRadius: 5,
                                borderLeft: `2px solid ${typeStyle.color}`,
                                whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis',
                                textDecoration: isCompleted ? 'line-through' : 'none',
                                opacity: isCompleted ? 0.6 : 1,
                                fontFamily: TYPOGRAPHY.body,
                              }}>
                                {item.title}
                              </div>
                            );
                          })}
                          {cell.items.length > 3 && (
                            <div style={{
                              fontSize: 10.5, color: PALETTE.textTertiary, paddingLeft: 2,
                              fontStyle: 'italic', fontFamily: TYPOGRAPHY.display,
                            }}>
                              +{cell.items.length - 3} more
                            </div>
                          )}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            ))}
          </div>
        </div>

      </div>

      <Modal
        open={addOpen}
        onClose={() => setAddOpen(false)}
        title="Add Assessment"
        maxWidth={520}
        footer={[
          <button key="cancel" onClick={() => setAddOpen(false)} style={{
            fontFamily: TYPOGRAPHY.body, fontSize: 12.5, fontWeight: 500,
            color: PALETTE.textSecondary, background: 'transparent', border: 'none',
            padding: '8px 14px', borderRadius: 7, cursor: 'pointer',
          }}>Cancel</button>,
          <button key="save" type="submit" form="add-assessment-form" style={{
            fontFamily: TYPOGRAPHY.body, fontSize: 12.5, fontWeight: 500,
            color: '#fff', background: PALETTE.accent, border: 'none',
            padding: '8px 16px', borderRadius: 7, cursor: 'pointer',
            boxShadow: '0 2px 6px rgba(22,101,52,0.25)',
          }}>Save Assessment</button>,
        ]}
      >
        <AddAssessmentForm
          onCancel={() => setAddOpen(false)}
          onSaved={() => setAddOpen(false)}
        />
      </Modal>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Calendar />);
</script>
</body>
</html>
