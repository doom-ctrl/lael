<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lael — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="shared.js"></script>
<style id="global-styles"></style>
<style>
  .row-hover { transition: all 0.18s ease; }
  .row-hover:hover { background: #F5F0E8 !important; }
  .row-hover:hover .row-edit { opacity: 1 !important; }
  .row-edit { opacity: 0; transition: opacity 0.15s ease; }
</style>
</head>
<body>
<div id="root"></div>
<script>
  document.getElementById('global-styles').textContent = window.Lael.GLOBAL_STYLES;
</script>
<script type="text/babel">
const {
  PALETTE, TYPOGRAPHY, ASSESSMENTS, TYPE_LABELS, TYPE_COLORS,
  PRIORITY_CONFIG, STATUS_CONFIG, Navbar, PageHeader, Modal, AddAssessmentForm,
  USER_NAME
} = window.Lael;

function CompactRow({ item }) {
  const [checked, setChecked] = React.useState(item.status === 'completed');
  const dateBadge = window.Lael.formatDateBadge(item.dueDate);
  const overdue = window.Lael.isOverdue(item);
  const completed = item.status === 'completed';
  const typeStyle = TYPE_COLORS[item.type];
  const priorityStyle = PRIORITY_CONFIG[item.priority];
  const statusStyle = STATUS_CONFIG[overdue ? 'overdue' : item.status];

  return (
    <div className="row-hover" style={{
      display: 'grid', gridTemplateColumns: 'auto 44px 1fr auto auto',
      alignItems: 'center', gap: 14,
      background: PALETTE.surface,
      border: `1px solid ${PALETTE.borderLight}`,
      borderRadius: 10, padding: '9px 14px',
      cursor: 'pointer', opacity: completed ? 0.6 : 1,
    }}>
      <button onClick={(e) => { e.stopPropagation(); setChecked(!checked); }} style={{
        width: 20, height: 20, borderRadius: 6, flexShrink: 0,
        border: `1.5px solid ${checked ? PALETTE.accent : PALETTE.border}`,
        background: checked ? PALETTE.accent : 'transparent',
        cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center',
        transition: 'all 0.15s ease',
      }}>
        {checked ? <svg width="11" height="11" viewBox="0 0 12 12" fill="none">
          <path d="M2 6.5l2.5 2.5L10 3.5" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
        </svg> : null}
      </button>
      <div style={{
        width: 40, height: 40, borderRadius: 9, flexShrink: 0,
        background: completed ? PALETTE.successLight : (overdue ? PALETTE.dangerLight : PALETTE.accentLight),
        border: `1px solid ${completed ? PALETTE.accentBorder : (overdue ? PALETTE.dangerBorder : PALETTE.accentBorder)}`,
        display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
      }}>
        <span style={{ fontSize: 8, fontWeight: 700, color: completed ? PALETTE.success : (overdue ? PALETTE.danger : PALETTE.accent), textTransform: 'uppercase', letterSpacing: '0.08em', lineHeight: 1.2 }}>{dateBadge.month}</span>
        <span style={{ fontSize: 17, fontWeight: 400, color: completed ? PALETTE.success : (overdue ? PALETTE.danger : PALETTE.accent), lineHeight: 1.1, fontFamily: TYPOGRAPHY.display }}>{dateBadge.day}</span>
      </div>
      <div style={{ minWidth: 0, overflow: 'hidden' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 2 }}>
          <span style={{
            fontSize: 14, fontWeight: 400, color: PALETTE.textPrimary,
            fontFamily: TYPOGRAPHY.display, fontStyle: 'italic',
            textDecoration: completed ? 'line-through' : 'none', opacity: completed ? 0.5 : 1,
            whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis',
          }}>{item.title}</span>
          <span style={{
            fontSize: 9, fontWeight: 600, padding: '1px 7px', borderRadius: 20,
            background: priorityStyle.bg, color: priorityStyle.color,
            textTransform: 'uppercase', letterSpacing: '0.06em', flexShrink: 0,
          }}>{priorityStyle.label}</span>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 11, color: PALETTE.textTertiary }}>
          <span style={{
            fontSize: 9, fontWeight: 600, padding: '1px 7px', borderRadius: 20,
            background: typeStyle.bg, color: typeStyle.color,
            textTransform: 'uppercase', letterSpacing: '0.05em',
          }}>{TYPE_LABELS[item.type]}</span>
          <span style={{ color: PALETTE.border }}>·</span>
          <span>{item.subject}</span>
          <span style={{ color: PALETTE.border }}>·</span>
          <span style={{ color: overdue ? PALETTE.danger : PALETTE.textTertiary, fontWeight: overdue ? 500 : 400 }}>
            {window.Lael.daysUntil(item.dueDate)}
          </span>
        </div>
      </div>
      <span style={{
        fontSize: 10.5, fontWeight: 500, padding: '3px 10px', borderRadius: 20,
        background: statusStyle.bg, color: statusStyle.color,
        border: `1px solid ${statusStyle.border}`, whiteSpace: 'nowrap',
      }}>{statusStyle.label}</span>
      <div className="row-edit" style={{ display: 'flex', gap: 4 }}>
        <button title="Edit" style={{ width: 28, height: 28, borderRadius: 6, border: `1px solid ${PALETTE.border}`, background: PALETTE.surface, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <svg width="11" height="11" viewBox="0 0 12 12" fill="none">
            <path d="M1 9.5l1-3.5 6.5-6.5 2.5 2.5L4.5 8.5L1 9.5z" stroke={PALETTE.textSecondary} strokeWidth="1.2" strokeLinejoin="round"/>
          </svg>
        </button>
        <button title="More" style={{ width: 28, height: 28, borderRadius: 6, border: `1px solid ${PALETTE.border}`, background: PALETTE.surface, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <svg width="12" height="12" viewBox="0 0 16 16" fill={PALETTE.textTertiary}><circle cx="3" cy="8" r="1.3"/><circle cx="8" cy="8" r="1.3"/><circle cx="13" cy="8" r="1.3"/></svg>
        </button>
      </div>
    </div>
  );
}

function Dashboard() {
  const [addOpen, setAddOpen] = React.useState(false);
  const today = new Date('2026-06-14');
  const hour = today.getHours();
  const greeting = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
  const dateStr = today.toLocaleDateString('en', { weekday: 'long', month: 'long', day: 'numeric' });

  const upcoming = ASSESSMENTS.filter(a => a.status !== 'completed');
  const completed = ASSESSMENTS.filter(a => a.status === 'completed').slice(0, 3);
  const pendingCount = ASSESSMENTS.filter(a => a.status === 'pending').length;
  const completionRate = Math.round((completed.length / ASSESSMENTS.length) * 100);
  const dueToday = ASSESSMENTS.filter(a => a.dueDate === '2026-06-14' && a.status !== 'completed');
  const thisWeekCount = 6;
  const totalCount = ASSESSMENTS.length;
  const completedCount = completed.length;

  return (
    <div>
      <Navbar activePage="dashboard" onAddClick={() => setAddOpen(true)} />

      <div style={{ maxWidth: 1500, margin: '0 auto', padding: '18px 32px 60px' }}>

        {/* Trimmed header — greeting as the title */}
        <PageHeader
          title={`${greeting}, ${USER_NAME}`}
          subtitle={dateStr}
          actions={[
            <a key="cal" href="calendar.html" style={{
              display: 'flex', alignItems: 'center', gap: 5,
              padding: '7px 12px', borderRadius: 8,
              border: `1px solid ${PALETTE.border}`,
              fontSize: 12, color: PALETTE.textPrimary, textDecoration: 'none',
              background: PALETTE.surface,
            }}>
              <svg width="12" height="12" viewBox="0 0 14 14" fill="none">
                <rect x="1.5" y="2.5" width="11" height="10" rx="1.5" stroke={PALETTE.textSecondary} strokeWidth="1.2"/>
                <path d="M1.5 5.5h11M4.5 1v3M9.5 1v3" stroke={PALETTE.textSecondary} strokeWidth="1.2" strokeLinecap="round"/>
              </svg>
              Calendar
            </a>,
          ]}
        />

        {/* Spotlight + stats row */}
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1.6fr', gap: 12, marginBottom: 20 }}>
          <div style={{
            background: dueToday.length > 0
              ? `linear-gradient(135deg, ${PALETTE.accentLight} 0%, ${PALETTE.bgWarm} 100%)`
              : PALETTE.surface,
            border: `1px solid ${dueToday.length > 0 ? PALETTE.accentBorder : PALETTE.border}`,
            borderRadius: 12, padding: '14px 18px', boxShadow: PALETTE.shadow,
            position: 'relative', overflow: 'hidden',
          }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6 }}>
              <div style={{
                width: 24, height: 24, borderRadius: 7, background: PALETTE.accent,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
              }}>
                <svg width="12" height="12" viewBox="0 0 14 14" fill="none">
                  <circle cx="7" cy="7" r="3" fill="white"/>
                  <path d="M7 1v1.5M7 11.5V13M1 7h1.5M11.5 7H13M2.5 2.5l1 1M10.5 10.5l1 1M2.5 11.5l1-1M10.5 3.5l1-1" stroke="white" strokeWidth="1.2" strokeLinecap="round"/>
                </svg>
              </div>
              <div style={{
                fontSize: 9.5, fontWeight: 600, color: PALETTE.accent,
                textTransform: 'uppercase', letterSpacing: '0.12em',
              }}>
                {dueToday.length > 0 ? 'Due Today' : 'All Clear Today'}
              </div>
            </div>
            {dueToday.length > 0 ? (
              <>
                <div style={{
                  fontFamily: TYPOGRAPHY.display, fontSize: 22, fontWeight: 400,
                  color: PALETTE.textPrimary, fontStyle: 'italic',
                  letterSpacing: '-0.01em', lineHeight: 1.2, marginBottom: 4,
                }}>{dueToday[0].title}</div>
                <div style={{ fontSize: 11.5, color: PALETTE.textSecondary }}>
                  {dueToday[0].subject} · {TYPE_LABELS[dueToday[0].type]}
                </div>
              </>
            ) : (
              <>
                <div style={{
                  fontFamily: TYPOGRAPHY.display, fontSize: 22, fontWeight: 400,
                  color: PALETTE.textPrimary, fontStyle: 'italic',
                  letterSpacing: '-0.01em', lineHeight: 1.2, marginBottom: 4,
                }}>Nothing due today</div>
                <div style={{ fontSize: 11.5, color: PALETTE.textSecondary }}>
                  Enjoy the breathing room.
                </div>
              </>
            )}
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 10 }}>
            {[
              { label: 'Pending', value: pendingCount, color: PALETTE.warning, bg: PALETTE.warningLight },
              { label: 'This Week', value: thisWeekCount, color: PALETTE.info, bg: PALETTE.infoLight },
              { label: 'Completed', value: completedCount, color: PALETTE.success, bg: PALETTE.successLight },
              { label: 'Total', value: totalCount, color: PALETTE.accent, bg: PALETTE.accentLight },
            ].map(stat => (
              <div key={stat.label} style={{
                background: PALETTE.surface, border: `1px solid ${PALETTE.borderLight}`,
                borderRadius: 12, padding: '12px 14px', boxShadow: PALETTE.shadow,
                position: 'relative', overflow: 'hidden',
              }}>
                <div style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 2, background: stat.color }} />
                <div style={{
                  fontSize: 9.5, fontWeight: 600, color: PALETTE.textTertiary,
                  textTransform: 'uppercase', letterSpacing: '0.1em',
                  marginBottom: 6, marginTop: 2,
                }}>{stat.label}</div>
                <div style={{
                  fontFamily: TYPOGRAPHY.display, fontSize: 30, fontWeight: 400,
                  color: stat.color, lineHeight: 1, fontStyle: 'italic',
                  letterSpacing: '-0.02em',
                }}>{stat.value}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Two-column layout: Upcoming + Completed */}
        <div style={{ display: 'grid', gridTemplateColumns: '1.6fr 1fr', gap: 16 }}>
          <div>
            <div style={{
              display: 'flex', alignItems: 'baseline', justifyContent: 'space-between',
              marginBottom: 10,
            }}>
              <div>
                <h2 style={{
                  fontFamily: TYPOGRAPHY.display, fontSize: 22, fontWeight: 400,
                  color: PALETTE.textPrimary, fontStyle: 'italic',
                  letterSpacing: '-0.01em', marginBottom: 2, lineHeight: 1,
                }}>Upcoming</h2>
                <p style={{ fontSize: 11.5, color: PALETTE.textTertiary }}>
                  All {upcoming.length} pending items, sorted by due date
                </p>
              </div>
              <a href="assessments.html" style={{
                fontSize: 12, color: PALETTE.accent, textDecoration: 'none', fontWeight: 500,
                display: 'flex', alignItems: 'center', gap: 4,
              }}>
                View all {ASSESSMENTS.length - completedCount}
                <svg width="11" height="11" viewBox="0 0 12 12" fill="none">
                  <path d="M2 6h8M6 2l4 4-4 4" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
              </a>
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
              {upcoming.map(item => <CompactRow key={item.id} item={item} />)}
            </div>
          </div>

          <div>
            <div style={{
              display: 'flex', alignItems: 'baseline', justifyContent: 'space-between',
              marginBottom: 10,
            }}>
              <div>
                <h2 style={{
                  fontFamily: TYPOGRAPHY.display, fontSize: 22, fontWeight: 400,
                  color: PALETTE.textPrimary, fontStyle: 'italic',
                  letterSpacing: '-0.01em', marginBottom: 2, lineHeight: 1,
                }}>Completed</h2>
                <p style={{ fontSize: 11.5, color: PALETTE.textTertiary }}>
                  {completionRate}% completion rate
                </p>
              </div>
            </div>

            <div style={{
              background: PALETTE.surface, border: `1px solid ${PALETTE.borderLight}`,
              borderRadius: 10, padding: '12px 14px', marginBottom: 10, boxShadow: PALETTE.shadow,
            }}>
              <div style={{
                display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                marginBottom: 8,
              }}>
                <span style={{ fontSize: 10.5, fontWeight: 600, color: PALETTE.textTertiary, textTransform: 'uppercase', letterSpacing: '0.1em' }}>
                  Progress
                </span>
                <span style={{ fontSize: 11, color: PALETTE.textPrimary, fontWeight: 500 }}>
                  {completedCount} / {totalCount}
                </span>
              </div>
              <div style={{ height: 6, background: PALETTE.bgWarm, borderRadius: 3, overflow: 'hidden' }}>
                <div style={{
                  height: '100%', width: `${completionRate}%`,
                  background: `linear-gradient(90deg, ${PALETTE.success} 0%, ${PALETTE.accent} 100%)`,
                  borderRadius: 3,
                }} />
              </div>
            </div>

            <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
              {completed.map(item => <CompactRow key={item.id} item={item} />)}
            </div>
          </div>
        </div>
      </div>

      {/* Add Assessment Modal */}
      <Modal
        open={addOpen}
        onClose={() => setAddOpen(false)}
        title="Add Assessment"
        maxWidth={520}
        footer={[
          <button key="cancel" onClick={() => setAddOpen(false)} style={{
            fontFamily: TYPOGRAPHY.body, fontSize: 12.5, fontWeight: 500,
            color: PALETTE.textSecondary, background: 'transparent', border: 'none',
            padding: '8px 14px', borderRadius: 7, cursor: 'pointer',
          }}>Cancel</button>,
          <button key="save" type="submit" form="add-assessment-form" style={{
            fontFamily: TYPOGRAPHY.body, fontSize: 12.5, fontWeight: 500,
            color: '#fff', background: PALETTE.accent, border: 'none',
            padding: '8px 16px', borderRadius: 7, cursor: 'pointer',
            boxShadow: '0 2px 6px rgba(22,101,52,0.25)',
          }}>Save Assessment</button>,
        ]}
      >
        <AddAssessmentForm
          onCancel={() => setAddOpen(false)}
          onSaved={() => setAddOpen(false)}
        />
      </Modal>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard />);
</script>
</body>
</html>
